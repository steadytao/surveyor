name: CI / Action Drift

on:
  pull_request:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".github/scripts/ci/**"
  push:
    branches:
      - master
    paths:
      - ".github/workflows/**"
      - ".github/scripts/ci/**"
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-action-drift-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  action-drift:
    name: Action Drift
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443
            codeload.github.com:443
            github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Python
        uses: actions/setup-python@83679a892e2d95755f2dac6acb0bfd1e9ac5d548 # v6.1.0
        with:
          python-version: "3.13"
          check-latest: false

      - name: Check Action Pins and Drift
        run: python3 ./.github/scripts/ci/check_action_pins.py
