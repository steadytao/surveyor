name: CI

on:
  workflow_dispatch:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master

concurrency:
  group: ci-${{ github.workflow }}-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

permissions:
  contents: read

defaults:
  run:
    shell: bash

env:
  GOTOOLCHAIN: local

jobs:
  clean-checkout:
    name: Clean Checkout Verification (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Print Go version
        run: go version

      - name: Check gofmt
        run: |
          mapfile -t go_files < <(git ls-files '*.go')
          if [ "${#go_files[@]}" -eq 0 ]; then
            echo "No Go files found for gofmt verification"
            exit 1
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [ -n "$unformatted" ]; then
            echo "Unformatted Go files:"
            echo "$unformatted"
            exit 1
          fi

      - name: Check module tidiness
        run: go mod tidy -diff

      - name: Verify module definitions
        run: go mod verify

      - name: Resolve CLI binary path
        run: |
          runner_temp="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            runner_temp="$(cygpath -u "$RUNNER_TEMP")"
          fi

          binary_name="surveyor"
          if [ "$RUNNER_OS" = "Windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          printf 'SURVEYOR_BINARY=%s\n' "$runner_temp/$binary_name" >> "$GITHUB_ENV"

      - name: Build CLI
        run: go build -o "$SURVEYOR_BINARY" ./cmd/surveyor

      - name: Run go vet
        run: go vet ./...

      - name: Run test suite
        run: go test -count=1 ./...

      - name: Run deterministic CLI smoke checks
        run: |
          set -euo pipefail

          assert_contains() {
            local text="$1"
            local needle="$2"
            local label="$3"
            if ! grep -Fq -- "$needle" <<<"$text"; then
              echo "$label did not contain expected text: $needle"
              exit 1
            fi
          }

          assert_file_exists() {
            local path="$1"
            local label="$2"
            if [ ! -f "$path" ]; then
              echo "$label was not created: $path"
              exit 1
            fi
          }

          repo_root="$PWD"
          temp_root="$(mktemp -d)"
          trap 'rm -rf "$temp_root"' EXIT

          output="$("$SURVEYOR_BINARY" --help)"
          assert_contains "$output" "surveyor scan tls" "CLI help output"
          assert_contains "$output" "surveyor discover remote" "CLI help output"

          output="$("$SURVEYOR_BINARY" discover remote --cidr 10.0.0.0/32 --ports 443 --dry-run)"
          assert_contains "$output" "# Surveyor Execution Plan" "CIDR dry-run output"
          assert_contains "$output" "- Input kind: cidr" "CIDR dry-run output"
          assert_contains "$output" "- Attempt count: 1" "CIDR dry-run output"

          targets_file="$repo_root/examples/approved-hosts.txt"
          output="$("$SURVEYOR_BINARY" audit remote --targets-file "$targets_file" --ports 443 --dry-run)"
          assert_contains "$output" "- Input kind: targets_file" "Targets-file dry-run output"
          assert_contains "$output" "- Targets file: " "Targets-file dry-run output"

          inventory_file="$repo_root/examples/inventory.yaml"
          output="$("$SURVEYOR_BINARY" audit remote --inventory-file "$inventory_file" --dry-run)"
          assert_contains "$output" "- Input kind: inventory_file" "Inventory dry-run output"
          assert_contains "$output" "- Inventory file: " "Inventory dry-run output"

          caddy_file="$repo_root/examples/caddy.json"
          output="$("$SURVEYOR_BINARY" discover remote --inventory-file "$caddy_file" --adapter caddy --dry-run)"
          assert_contains "$output" "- Adapter: caddy" "Caddy adapter dry-run output"

          ingress_file="$repo_root/examples/ingress.yaml"
          output="$("$SURVEYOR_BINARY" audit remote --inventory-file "$ingress_file" --adapter kubernetes-ingress-v1 --dry-run)"
          assert_contains "$output" "- Adapter: kubernetes-ingress-v1" "Kubernetes adapter dry-run output"
          assert_contains "$output" "- Attempt count: 2" "Kubernetes adapter dry-run output"

          baseline="$repo_root/examples/audit.json"
          current="$repo_root/examples/audit.json"
          diff_markdown_path="$temp_root/diff.md"
          diff_json_path="$temp_root/diff.json"
          "$SURVEYOR_BINARY" diff "$baseline" "$current" -o "$diff_markdown_path" -j "$diff_json_path" >/dev/null
          assert_file_exists "$diff_markdown_path" "Diff Markdown output"
          assert_file_exists "$diff_json_path" "Diff JSON output"
          diff_json="$(cat "$diff_json_path")"
          assert_contains "$diff_json" '"report_kind": "diff"' "Diff JSON output"

          priorities_markdown_path="$temp_root/priorities.md"
          priorities_json_path="$temp_root/priorities.json"
          "$SURVEYOR_BINARY" prioritize "$current" --profile migration-readiness -o "$priorities_markdown_path" -j "$priorities_json_path" >/dev/null
          assert_file_exists "$priorities_markdown_path" "Prioritization Markdown output"
          assert_file_exists "$priorities_json_path" "Prioritization JSON output"
          priorities_json="$(cat "$priorities_json_path")"
          assert_contains "$priorities_json" '"report_kind": "prioritization"' "Prioritization JSON output"
          assert_contains "$priorities_json" '"profile": "migration-readiness"' "Prioritization JSON output"

      - name: Check diff formatting
        run: git diff --check

      - name: Ensure working tree is unchanged
        run: |
          status="$(git status --porcelain=v1)"
          if [ -n "$status" ]; then
            echo "working tree changed during verification"
            echo "$status"
            exit 1
          fi

  verify:
    name: Build, Test and Smoke (${{ matrix.os }})
    runs-on: ${{ matrix.runner }}
    timeout-minutes: 15
    strategy:
      fail-fast: false
      matrix:
        include:
          - os: ubuntu-latest
            runner: ubuntu-latest
          - os: windows-latest
            runner: windows-latest
          - os: macos-latest
            runner: macos-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Print Go version
        run: go version

      - name: Print Go environment
        run: go env

      - name: Download modules
        run: go mod download

      - name: Verify module definitions
        run: go mod verify

      - name: Resolve CLI binary path
        run: |
          runner_temp="$RUNNER_TEMP"
          if command -v cygpath >/dev/null 2>&1; then
            runner_temp="$(cygpath -u "$RUNNER_TEMP")"
          fi

          binary_name="surveyor"
          if [ "$RUNNER_OS" = "Windows" ]; then
            binary_name="${binary_name}.exe"
          fi

          printf 'SURVEYOR_BINARY=%s\n' "$runner_temp/$binary_name" >> "$GITHUB_ENV"

      - name: Build CLI
        run: go build -o "$SURVEYOR_BINARY" ./cmd/surveyor

      - name: Run go vet
        run: go vet ./...

      - name: Run test suite
        run: go test -count=1 ./...

      - name: Run deterministic CLI smoke checks
        run: |
          set -euo pipefail

          assert_contains() {
            local text="$1"
            local needle="$2"
            local label="$3"
            if ! grep -Fq -- "$needle" <<<"$text"; then
              echo "$label did not contain expected text: $needle"
              exit 1
            fi
          }

          assert_file_exists() {
            local path="$1"
            local label="$2"
            if [ ! -f "$path" ]; then
              echo "$label was not created: $path"
              exit 1
            fi
          }

          repo_root="$PWD"
          temp_root="$(mktemp -d)"
          trap 'rm -rf "$temp_root"' EXIT

          output="$("$SURVEYOR_BINARY" --help)"
          assert_contains "$output" "surveyor scan tls" "CLI help output"
          assert_contains "$output" "surveyor discover remote" "CLI help output"

          output="$("$SURVEYOR_BINARY" discover remote --cidr 10.0.0.0/32 --ports 443 --dry-run)"
          assert_contains "$output" "# Surveyor Execution Plan" "CIDR dry-run output"
          assert_contains "$output" "- Input kind: cidr" "CIDR dry-run output"
          assert_contains "$output" "- Attempt count: 1" "CIDR dry-run output"

          targets_file="$repo_root/examples/approved-hosts.txt"
          output="$("$SURVEYOR_BINARY" audit remote --targets-file "$targets_file" --ports 443 --dry-run)"
          assert_contains "$output" "- Input kind: targets_file" "Targets-file dry-run output"
          assert_contains "$output" "- Targets file: " "Targets-file dry-run output"

          inventory_file="$repo_root/examples/inventory.yaml"
          output="$("$SURVEYOR_BINARY" audit remote --inventory-file "$inventory_file" --dry-run)"
          assert_contains "$output" "- Input kind: inventory_file" "Inventory dry-run output"
          assert_contains "$output" "- Inventory file: " "Inventory dry-run output"

          caddy_file="$repo_root/examples/caddy.json"
          output="$("$SURVEYOR_BINARY" discover remote --inventory-file "$caddy_file" --adapter caddy --dry-run)"
          assert_contains "$output" "- Adapter: caddy" "Caddy adapter dry-run output"

          ingress_file="$repo_root/examples/ingress.yaml"
          output="$("$SURVEYOR_BINARY" audit remote --inventory-file "$ingress_file" --adapter kubernetes-ingress-v1 --dry-run)"
          assert_contains "$output" "- Adapter: kubernetes-ingress-v1" "Kubernetes adapter dry-run output"
          assert_contains "$output" "- Attempt count: 2" "Kubernetes adapter dry-run output"

          baseline="$repo_root/examples/audit.json"
          current="$repo_root/examples/audit.json"
          diff_markdown_path="$temp_root/diff.md"
          diff_json_path="$temp_root/diff.json"
          "$SURVEYOR_BINARY" diff "$baseline" "$current" -o "$diff_markdown_path" -j "$diff_json_path" >/dev/null
          assert_file_exists "$diff_markdown_path" "Diff Markdown output"
          assert_file_exists "$diff_json_path" "Diff JSON output"
          diff_json="$(cat "$diff_json_path")"
          assert_contains "$diff_json" '"report_kind": "diff"' "Diff JSON output"

          priorities_markdown_path="$temp_root/priorities.md"
          priorities_json_path="$temp_root/priorities.json"
          "$SURVEYOR_BINARY" prioritize "$current" --profile migration-readiness -o "$priorities_markdown_path" -j "$priorities_json_path" >/dev/null
          assert_file_exists "$priorities_markdown_path" "Prioritization Markdown output"
          assert_file_exists "$priorities_json_path" "Prioritization JSON output"
          priorities_json="$(cat "$priorities_json_path")"
          assert_contains "$priorities_json" '"report_kind": "prioritization"' "Prioritization JSON output"
          assert_contains "$priorities_json" '"profile": "migration-readiness"' "Prioritization JSON output"

  race:
    name: Race Detection (ubuntu-latest)
    runs-on: ubuntu-latest
    timeout-minutes: 30

    steps:
      - name: Check out repository
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2

      - name: Set up Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: true
          cache: true

      - name: Print Go version
        run: go version

      - name: Download modules
        run: go mod download

      - name: Verify module definitions
        run: go mod verify

      - name: Run race-enabled test suite
        run: go test -count=1 -race ./...
