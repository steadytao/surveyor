name: CI / Lint

on:
  pull_request:
    branches:
      - master
  push:
    branches:
      - master
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: ci-lint-${{ github.event.pull_request.number || github.ref }}
  cancel-in-progress: true

defaults:
  run:
    shell: bash

jobs:
  preflight:
    name: Preflight
    runs-on: ubuntu-latest
    timeout-minutes: 3
    outputs:
      has_go_mod: ${{ steps.detect.outputs.has_go_mod }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443
            codeload.github.com:443
            github.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Detect Go Module
        id: detect
        run: |
          set -euo pipefail

          if [ -f go.mod ]; then
            echo "has_go_mod=true" >> "${GITHUB_OUTPUT}"
            exit 0
          fi

          {
            echo "# CI / Lint"
            echo "- Result: skipped"
            echo
            echo "## Why this was skipped"
            echo "- No \`go.mod\` file was found at the repository root."
          } >> "${GITHUB_STEP_SUMMARY}"

          echo "has_go_mod=false" >> "${GITHUB_OUTPUT}"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    timeout-minutes: 15
    needs:
      - preflight
    if: ${{ needs.preflight.outputs.has_go_mod == 'true' }}
    steps:
      - name: Harden Runner
        uses: step-security/harden-runner@6c3c2f2c1c457b00c10c4848d6f5491db3b629df # v2.18.0
        with:
          egress-policy: block
          allowed-endpoints: |
            api.github.com:443
            codeload.github.com:443
            github.com:443
            github-releases.githubusercontent.com:443
            objects.githubusercontent.com:443
            raw.githubusercontent.com:443
            release-assets.githubusercontent.com:443

      - name: Checkout
        uses: actions/checkout@de0fac2e4500dabe0009e67214ff5f5447ce83dd # v6.0.2
        with:
          persist-credentials: false
          fetch-depth: 1

      - name: Setup Go
        uses: actions/setup-go@4b73464bb391d4059bd26b0524d20df3927bd417 # v6.3.0
        with:
          go-version-file: go.mod
          check-latest: false
          cache: true

      - name: Check gofmt
        run: |
          set -euo pipefail
          mapfile -t go_files < <(git ls-files '*.go')
          if [ "${#go_files[@]}" -eq 0 ]; then
            echo "No Go files found for gofmt verification." >&2
            exit 1
          fi

          unformatted="$(gofmt -l "${go_files[@]}")"
          if [ -n "${unformatted}" ]; then
            echo "Unformatted Go files:"
            echo "${unformatted}"
            exit 1
          fi

      - name: Run go vet
        run: |
          set -euo pipefail
          go vet ./...
